spring:
  profiles:
    active: test
  datasource:
    url: jdbc:h2:mem:notifier-test;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: none
  sql:
    init:
      mode: always
      schema-locations: classpath:sql/schema.sql

outbox:
  worker:
    auto-start: false
